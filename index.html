<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kevin Dana Dev Tech</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }
    .container { position: relative; z-index: 1; text-align: center; padding: 2rem; }
    .tag {
      display: inline-block;
      border: 1px solid #e2fb5a;
      color: #e2fb5a;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      margin-bottom: 2rem;
    }
    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    h1 span { color: #e2fb5a; }
    p {
      color: #666;
      font-size: 1rem;
      line-height: 1.8;
      max-width: 480px;
      margin: 0 auto 2rem;
    }
    a {
      display: inline-block;
      background: #e2fb5a;
      color: #0a0a0a;
      text-decoration: none;
      padding: 0.8rem 2rem;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    a:hover { background: #c8e040; }
    .cursor {
      display: inline-block;
      width: 3px;
      height: 1em;
      background: #e2fb5a;
      vertical-align: middle;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <div class="tag">{ sitio de prueba }</div>
    <h1>KD<span>.</span>TECH<span class="cursor"></span></h1>
    <p>Hola, soy Kevin. Desarrollador Full Stack construyendo interfaces y soluciones digitales con precision y estilo.</p>
    <a href="https://github.com/kevindanadev-tech" target="_blank">Ver GitHub &rarr;</a>
  </div>
</body>
</html>
